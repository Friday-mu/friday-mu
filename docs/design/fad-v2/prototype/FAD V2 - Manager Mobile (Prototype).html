<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FAD V2 — Manager Mobile (clickable prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="fad-desktop.css">
<style>
  html,body{margin:0;background:#06080c;color:#e8ecf3;min-height:100vh;font-family:"Hanken Grotesk",system-ui,sans-serif}
  #r{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}
  /* device shell around the .mphone screen */
  .device{position:relative;width:392px;height:812px;border-radius:46px;background:#0a0d13;
    border:1px solid #20262f;box-shadow:0 0 0 9px #14181f,0 40px 90px rgba(0,0,0,.6);padding:11px;flex:0 0 auto}
  .device::after{content:"";position:absolute;top:13px;left:50%;transform:translateX(-50%);width:118px;height:26px;border-radius:0 0 16px 16px;background:#0a0d13;z-index:30}
  .device .screen{position:relative;width:100%;height:100%;border-radius:36px;overflow:hidden;background:var(--bg)}
  .device .fad-route-m{height:100%}
  .device .mphone{width:100%!important;height:100%!important;border-radius:0!important;border:none!important;max-width:none!important;box-shadow:none!important}
  #boot{position:fixed;inset:0;background:#06080c;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9999;transition:opacity .4s;animation:bootFailsafe .01s linear 3s forwards}
  #boot.gone{opacity:0;pointer-events:none}
  @keyframes bootFailsafe{to{opacity:0;visibility:hidden;pointer-events:none}}
  #boot .mk{width:50px;height:50px;border-radius:14px;background:linear-gradient(150deg,#5681ff,#3a5ad9);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;box-shadow:0 12px 40px rgba(86,129,255,.4);animation:bootpulse 1.3s ease-in-out infinite}
  #boot .lbl{color:#7a8699;font:600 12px "Hanken Grotesk";letter-spacing:.04em}
  @keyframes bootpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
</style>
</head>
<body>
<div id="boot"><div class="mk">✦</div><div class="lbl">Loading FAD mobile…</div></div>
<div id="r"><div class="device"><div class="screen" id="screen"></div></div></div>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="20" fill="#5681ff"/><g fill="#fff"><rect x="34" y="20" width="32" height="60" rx="7" fill="none" stroke="#fff" stroke-width="3"/><path d="M50 34l2.6 7.6L60 44l-7.4 2.4L50 54l-2.6-7.6L40 44l7.4-2.4z"/></g></svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="fad-desktop.jsx"></script>
<script type="text/babel" src="fad-mobile-screens.jsx"></script>
<script type="text/babel" src="fad-router.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('screen')).render(<window.FADROUTER.MobileApp/>);
  function __hideBoot(){ const b=document.getElementById('boot'); if(b){ b.classList.add('gone'); setTimeout(()=>b.remove(),450); } }
  setTimeout(__hideBoot, 500);
  window.addEventListener('load', ()=>setTimeout(__hideBoot, 300));
</script>
</body>
</html>
