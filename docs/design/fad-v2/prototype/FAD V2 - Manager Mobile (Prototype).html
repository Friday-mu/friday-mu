<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FAD V2 — Manager Mobile (clickable prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,800;1,900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="friday-f.png">
<link rel="stylesheet" href="fad-desktop.css">
<link rel="stylesheet" href="fos-anim.css">
<script src="friday-f-paths.js"></script>
<script src="fos-boot.js"></script>
<style>
  html,body{margin:0;background:#070C1A;color:#EAF0FB;min-height:100vh;font-family:"Space Grotesk",system-ui,sans-serif}
  #r{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}
  /* device shell around the .mphone screen */
  .device{position:relative;width:392px;height:812px;border-radius:46px;background:#0a0d13;
    border:1px solid #20262f;box-shadow:0 0 0 9px #14181f,0 40px 90px rgba(0,0,0,.6);padding:11px;flex:0 0 auto}
  .device::after{content:"";position:absolute;top:13px;left:50%;transform:translateX(-50%);width:0;height:0}
  .devswitch{display:flex;gap:7px;justify-content:center;margin-top:18px}
  .devswitch button{font:600 11px "Space Grotesk";color:#8FA0C2;background:#0F1A33;border:1px solid #1d2b46;border-radius:8px;padding:6px 11px;cursor:pointer}
  .devswitch button.on{color:#fff;border-color:#3E74D9;background:#3E74D9}
  .device .screen{position:relative;width:100%;height:100%;border-radius:36px;overflow:hidden;background:var(--bg)}
  .device .fad-route-m{height:100%}
  .device .mphone{width:100%!important;height:100%!important;border-radius:0!important;border:none!important;max-width:none!important;box-shadow:none!important}
  #boot{position:fixed;inset:0;background:radial-gradient(120% 100% at 50% 0%,#0C1428,#070C1A);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:9999;transition:opacity .5s;animation:bootFailsafe .01s linear 3.5s forwards}
  #boot.gone{opacity:0;pointer-events:none}
  @keyframes bootFailsafe{to{opacity:0;visibility:hidden;pointer-events:none}}
  #boot .boot-orbit{position:relative;width:78px;height:78px;display:flex;align-items:center;justify-content:center}
  #boot .boot-orbit::before{content:"";position:absolute;inset:0;border-radius:23px;background:conic-gradient(from 0deg,transparent 0 68%,rgba(62,116,217,.95));-webkit-mask:radial-gradient(closest-side,transparent 71%,#000 73%);mask:radial-gradient(closest-side,transparent 71%,#000 73%);animation:bootspin 1.05s linear infinite}
  #boot .boot-mk{width:52px;height:52px;border-radius:15px;background:url('friday-f.png') center/cover no-repeat;box-shadow:0 14px 44px rgba(62,116,217,.30),inset 0 1px 0 rgba(255,255,255,.18);animation:bootbreath 1.8s ease-in-out infinite}
  #boot .boot-draw{width:78px;height:78px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 10px 30px rgba(62,116,217,.4));animation:fos-mark-in .7s cubic-bezier(.2,.7,.3,1) both}
  #boot .boot-wm{font:italic 800 20px/1 'Archivo',"Space Grotesk";letter-spacing:-.02em;color:#8FA0C2;animation:fos-word-clip 1s .2s cubic-bezier(.5,.05,.1,1) both}
  #boot .boot-wm b{color:#fff;font-weight:900}
  #boot .boot-wm i{color:#5A93EC;font-style:italic;font-weight:900}
  #boot .boot-bar{width:150px;height:3px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden}
  #boot .boot-bar i{display:block;height:100%;width:42%;border-radius:3px;background:linear-gradient(90deg,#1A4A9E,#3E74D9);animation:bootbar 1.2s ease-in-out infinite}
  #boot .boot-sub{font:600 10px "JetBrains Mono",monospace;letter-spacing:.22em;color:#5d6f93;text-transform:uppercase}
  @keyframes bootspin{to{transform:rotate(360deg)}}
  @keyframes bootbreath{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
  @keyframes bootbar{0%{transform:translateX(-130%)}100%{transform:translateX(320%)}}
</style>
</head>
<body>
<div id="boot"><div class="boot-draw" data-fos-draw data-size="78" data-color="#3E74D9" data-w="2.4" data-dur="2.0"></div><div class="boot-wm"><b>Friday</b><i>OS</i></div><div class="boot-bar"><i></i></div><div class="boot-sub">Starting mobile</div></div>
<div id="r"><div><div class="device" data-device="dynamic-island" id="device"><div class="screen" id="screen"></div></div>
<div class="devswitch">
  <button data-dev="dynamic-island" class="on">Dynamic Island</button>
  <button data-dev="notch">Notch</button>
  <button data-dev="android">Android</button>
  <button data-dev="huawei">Huawei</button>
</div></div></div>
<div id="aistate"></div>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="20" fill="#5681ff"/><g fill="#fff"><rect x="34" y="20" width="32" height="60" rx="7" fill="none" stroke="#fff" stroke-width="3"/><path d="M50 34l2.6 7.6L60 44l-7.4 2.4L50 54l-2.6-7.6L40 44l7.4-2.4z"/></g></svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="fad-desktop.jsx"></script>
<script type="text/babel" src="fad-states.jsx"></script>
<script type="text/babel" src="fad-mobile-screens.jsx"></script>
<script type="text/babel" src="fad-voice.jsx"></script>
<script src="fad-dictation.js"></script>
<script type="text/babel" src="fad-router.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('screen')).render(<window.FADROUTER.MobileApp/>);
  ReactDOM.createRoot(document.getElementById('aistate')).render(<window.FADSTATE.AIStateToggle/>);
  function __hideBoot(){ const b=document.getElementById('boot'); if(b){ b.classList.add('gone'); setTimeout(()=>b.remove(),450); } }
  setTimeout(__hideBoot, 500);
  window.addEventListener('load', ()=>setTimeout(__hideBoot, 300));
  // device-type switcher (Dynamic Island / Notch / Android / Huawei)
  document.querySelectorAll('.devswitch button').forEach(b=>b.addEventListener('click',()=>{
    document.getElementById('device').setAttribute('data-device', b.dataset.dev);
    document.querySelectorAll('.devswitch button').forEach(x=>x.classList.toggle('on', x===b));
  }));
</script>
</body>
</html>
