<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FAD V2 — Field Desktop (clickable prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,800;1,900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="friday-f.png">
<link rel="stylesheet" href="fad-desktop.css">
<link rel="stylesheet" href="fad-field.css">
<link rel="stylesheet" href="fos-anim.css">
<script src="friday-f-paths.js"></script>
<script src="fos-boot.js"></script>
<style>
  html,body{margin:0;background:#070C1A;color:#EAF0FB;font-family:"Space Grotesk",system-ui,sans-serif}
  #r{padding:18px}
  #boot{position:fixed;inset:0;background:radial-gradient(120% 100% at 50% 0%,#0C1428,#070C1A);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:9999;transition:opacity .5s;animation:bootFailsafe .01s linear 3.5s forwards}
  #boot.gone{opacity:0;pointer-events:none}
  @keyframes bootFailsafe{to{opacity:0;visibility:hidden;pointer-events:none}}
  #boot .boot-orbit{position:relative;width:84px;height:84px;display:flex;align-items:center;justify-content:center}
  #boot .boot-orbit::before{content:"";position:absolute;inset:0;border-radius:25px;background:conic-gradient(from 0deg,transparent 0 68%,rgba(62,116,217,.95));-webkit-mask:radial-gradient(closest-side,transparent 71%,#000 73%);mask:radial-gradient(closest-side,transparent 71%,#000 73%);animation:bootspin 1.05s linear infinite}
  #boot .boot-mk{width:58px;height:58px;border-radius:17px;background:url('friday-f.png') center/cover no-repeat;box-shadow:0 14px 44px rgba(62,116,217,.30),inset 0 1px 0 rgba(255,255,255,.18);animation:bootbreath 1.8s ease-in-out infinite}
  #boot .boot-draw{width:84px;height:84px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 10px 34px rgba(62,116,217,.4));animation:fos-mark-in .7s cubic-bezier(.2,.7,.3,1) both}
  #boot .boot-wm{font:italic 800 21px/1 'Archivo',"Space Grotesk";letter-spacing:-.02em;color:#8FA0C2;animation:fos-word-clip 1s .2s cubic-bezier(.5,.05,.1,1) both}
  #boot .boot-wm b{color:#fff;font-weight:900}
  #boot .boot-wm i{color:#5A93EC;font-style:italic;font-weight:900}
  #boot .boot-bar{width:160px;height:3px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden}
  #boot .boot-bar i{display:block;height:100%;width:42%;border-radius:3px;background:linear-gradient(90deg,#1A4A9E,#3E74D9);animation:bootbar 1.2s ease-in-out infinite}
  #boot .boot-sub{font:600 10px "JetBrains Mono",monospace;letter-spacing:.22em;color:#5d6f93;text-transform:uppercase}
  @keyframes bootspin{to{transform:rotate(360deg)}}
  @keyframes bootbreath{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
  @keyframes bootbar{0%{transform:translateX(-130%)}100%{transform:translateX(320%)}}
</style>
</head>
<body>
<div id="boot"><div class="boot-draw" data-fos-draw data-size="84" data-color="#3E74D9" data-w="2.3" data-dur="2.0"></div><div class="boot-wm"><b>Friday</b><i>OS</i></div><div class="boot-bar"><i></i></div><div class="boot-sub">Starting Field workspace</div></div>
<div id="r"></div>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" rx="20" fill="#0a0d12"/>
<rect x="14" y="20" width="22" height="60" rx="5" fill="#151c2b" stroke="#5681ff" stroke-width="1.5"/>
<rect x="19" y="28" width="12" height="4" rx="2" fill="#5681ff"/>
<rect x="19" y="38" width="12" height="3" rx="1.5" fill="#46c08a"/>
<rect x="19" y="46" width="12" height="3" rx="1.5" fill="#243044"/>
<rect x="44" y="20" width="42" height="60" rx="5" fill="#0f1521" stroke="#243044" stroke-width="1.5"/>
<rect x="50" y="28" width="30" height="6" rx="2" fill="#46c08a"/>
<rect x="50" y="40" width="30" height="8" rx="2" fill="#1a2435"/>
<rect x="50" y="52" width="30" height="8" rx="2" fill="#1a2435"/>
</svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="fad-desktop.jsx"></script>
<script type="text/babel" src="fad-data.jsx"></script>
<script type="text/babel" src="fad-field-desktop.jsx"></script>
<script type="text/babel" src="fad-field-screens.jsx"></script>
<script type="text/babel" src="fad-field-screens2.jsx"></script>
<script type="text/babel" src="fad-field-router.jsx"></script>
<script src="fad-dictation.js"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('r')).render(<window.FADFIELDROUTER.FieldDesktopApp/>);
  function __hideBoot(){ const b=document.getElementById('boot'); if(b){ b.classList.add('gone'); setTimeout(()=>b.remove(),450); } }
  setTimeout(__hideBoot, 500);
  window.addEventListener('load', ()=>setTimeout(__hideBoot, 300));
</script>
</body>
</html>
