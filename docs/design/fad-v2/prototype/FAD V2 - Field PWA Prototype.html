<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FAD V2 — Field PWA Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,800;1,900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="fad.css">
<link rel="stylesheet" href="fos-anim.css">
<script src="friday-f-paths.js"></script>
<script src="fos-boot.js"></script>
<style>
  html,body{margin:0;background:#070C1A;height:100%}#root{height:100%}
  #boot{position:fixed;inset:0;background:radial-gradient(120% 100% at 50% 0%,#0C1428,#070C1A);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:9999;transition:opacity .5s;animation:bootFailsafe .01s linear 3.5s forwards}
  #boot.gone{opacity:0;pointer-events:none}
  @keyframes bootFailsafe{to{opacity:0;visibility:hidden;pointer-events:none}}
  #boot .boot-draw{width:80px;height:80px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 10px 30px rgba(62,116,217,.4));animation:fos-mark-in .7s cubic-bezier(.2,.7,.3,1) both}
  #boot .boot-wm{font:italic 800 20px/1 'Archivo',"Space Grotesk";letter-spacing:-.02em;color:#8FA0C2;animation:fos-word-clip 1s .2s cubic-bezier(.5,.05,.1,1) both}
  #boot .boot-wm b{color:#fff;font-weight:900}#boot .boot-wm i{color:#5A93EC;font-style:italic;font-weight:900}
  #boot .boot-bar{width:150px;height:3px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden}
  #boot .boot-bar i{display:block;height:100%;width:42%;border-radius:3px;background:linear-gradient(90deg,#1A4A9E,#3E74D9);animation:bootbar 1.2s ease-in-out infinite}
  #boot .boot-sub{font:600 10px "JetBrains Mono",monospace;letter-spacing:.22em;color:#5d6f93;text-transform:uppercase}
  @keyframes bootbar{0%{transform:translateX(-130%)}100%{transform:translateX(320%)}}
</style>
</head>
<body>
<div id="boot"><div class="boot-draw" data-fos-draw data-size="80" data-color="#3E74D9" data-w="2.4" data-dur="2.0"></div><div class="boot-wm"><b>Friday</b><i>OS</i></div><div class="boot-bar"><i></i></div><div class="boot-sub">Starting Field</div></div>
<div id="root"></div>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="#0a0d12"/>
<rect x="31" y="16" width="38" height="68" rx="9" fill="#151c2b" stroke="#5681ff" stroke-width="1.5"/>
<rect x="37" y="24" width="26" height="6" rx="2" fill="#5681ff"/>
<rect x="37" y="36" width="20" height="4" rx="2" fill="#46c08a"/>
<rect x="37" y="45" width="26" height="9" rx="2" fill="#243044"/>
<rect x="37" y="58" width="26" height="9" rx="2" fill="#243044"/>
<circle cx="50" cy="78" r="3" fill="#5681ff"/>
</svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="fad-kit.jsx"></script>
<script type="text/babel" src="fad-data.jsx"></script>
<script type="text/babel" src="fad-screens-a.jsx"></script>
<script type="text/babel" src="fad-screens-b.jsx"></script>
<script type="text/babel" src="fad-screens-c.jsx"></script>
<script type="text/babel" src="fad-screens-d.jsx"></script>
<script type="text/babel" src="fad-screens-e.jsx"></script>
<script type="text/babel" src="fad-screens-f.jsx"></script>
<script type="text/babel" src="fad-proto.jsx"></script>
<script src="fad-dictation.js"></script>

<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<FadApp/>);
  function __hideBoot(){ const b=document.getElementById('boot'); if(b){ b.classList.add('gone'); setTimeout(()=>b.remove(),450); } }
  setTimeout(__hideBoot, 600);
  window.addEventListener('load', ()=>setTimeout(__hideBoot, 350));
</script>
</body>
</html>
